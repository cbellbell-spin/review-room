name: fly deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    concurrency: deploy-group   # never run two deploys at once
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only --build-arg GIT_COMMIT_SHA=${{ github.sha }} --build-arg BUILD_RELEASE_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
